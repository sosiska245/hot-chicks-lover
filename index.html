<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>ОТХОДЫ :: POZNAN</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body { width:100%; height:100%; background:#0a0a1a; font-family:Arial,Helvetica,sans-serif; overflow:hidden; }
body { display:flex; flex-direction:column; height:100vh; }

/* ── MAP ─── */
#map-wrap { flex:1; position:relative; overflow:hidden; min-height:0; }
#map { position:absolute; inset:0; }

/* warm red tint on dark tiles */
.leaflet-tile-pane { filter: hue-rotate(348deg) saturate(1.1) brightness(0.95); }

/* ── FLOATING TITLE ─── */
#float-title {
  position:absolute; top:16px; left:16px; z-index:1000; pointer-events:none;
}
#float-title .t1 {
  display:block;
  font-family:'Arial Black',Impact,Arial,sans-serif;
  font-size:clamp(52px,9vw,82px);
  font-weight:900;
  color:#dd0000;
  text-shadow: 3px 3px 0 #000, 0 0 20px rgba(220,0,0,0.4);
  letter-spacing:4px;
  line-height:0.92;
}
#float-title .t2 {
  display:block;
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(11px,2vw,16px);
  font-weight:900;
  color:#ffaa00;
  letter-spacing:3px;
  text-shadow:1px 1px 0 #000;
  margin-top:6px;
}

/* ── INFO — stacks below title ─── */
#info {
  position:absolute; top:16px; left:16px; z-index:999;
  pointer-events:none; display:none;
  padding-top:clamp(66px,13vw,100px);
}
#info.show { display:block; }
#info-date {
  font-family:'Arial Black',Impact,Arial,sans-serif;
  color:#ffaa00; font-size:20px; font-weight:900;
  text-shadow:2px 2px 0 #000; line-height:1;
}
#info-dist {
  color:#ff4444; font-size:11px; margin-top:5px;
  line-height:1.9; letter-spacing:0.5px; text-shadow:1px 1px 0 #000;
}
#info-total {
  color:#ffaa00; font-size:9px; margin-top:4px;
  letter-spacing:2px; text-shadow:1px 1px 0 #000;
  border-top:1px solid #2a0a00; padding-top:3px;
}

/* ── DATE STRIP ─── */
#strip-wrap {
  background:#0a0a1a; border-top:3px solid #dd0000;
  padding:5px 8px 6px; flex-shrink:0;
  overflow-x:auto; overflow-y:hidden; touch-action:pan-x;
  scrollbar-width:thin; scrollbar-color:#dd0000 #0d0d22;
}
#strip-wrap::-webkit-scrollbar { height:3px; }
#strip-wrap::-webkit-scrollbar-thumb { background:#dd0000; }
#strip-wrap::-webkit-scrollbar-track { background:#0d0d22; }

#date-strip { display:flex; gap:3px; width:max-content; }

.chip {
  cursor:pointer; text-align:center; padding:4px 8px 5px;
  min-width:44px; user-select:none; touch-action:manipulation;
  color:#1a0a0a; border:1px solid #150505; flex-shrink:0;
  transition:background .1s,color .1s,border-color .1s;
}
.chip.future { color:#dd0000; border-color:#2a0808; border-left:2px solid #dd0000; }
.chip.future:hover { background:#150505; }
.chip.active { background:#dd0000; color:#fff; border-color:#dd0000; }
.chip .d {
  display:block; font-family:'Arial Black',Impact,Arial,sans-serif;
  font-size:18px; font-weight:900; line-height:1;
}
.chip .m { display:block; font-size:8px; letter-spacing:1px; margin-top:2px; opacity:.9; }
.chip .bar {
  display:block; height:2px; margin-top:3px;
  background:#150505; width:100%; position:relative;
}
.chip .bar::after {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:var(--fill); background:#ffaa00;
}
.chip.active .bar::after { background:rgba(255,255,255,0.5); }

/* ── MOBILE ── */
@media (max-width:700px) {
  /* Title: compact */
  #float-title { top:8px; left:10px; }
  #float-title .t1 { font-size:clamp(22px,6vw,30px); letter-spacing:2px; }
  #float-title .t2 { font-size:9px; letter-spacing:2px; margin-top:3px; }

  /* Alarm: small corner icon */
  #alarm { width:72px; top:8px; right:8px; }

  /* Info: slim bar anchored to bottom of map */
  #info {
    top:auto; bottom:0; left:0; right:0;
    padding-top:0; padding:5px 10px 5px;
    background:rgba(10,10,26,0.88);
    border-top:1px solid #330000;
    display:none;
  }
  #info.show { display:flex; flex-direction:row; flex-wrap:wrap; align-items:baseline; gap:6px 14px; }
  #info-date { font-size:13px; }
  #info-dist { font-size:9px; margin-top:0; line-height:1.6; }
  #info-total { font-size:8px; margin-top:0; border-top:none; padding-top:0; }

  /* Date strip: horizontal scroll at bottom */
  body { flex-direction:column !important; }
  #strip-wrap {
    width:auto; height:auto; border-left:none;
    border-top:3px solid #dd0000;
    overflow-x:auto; overflow-y:hidden;
    padding:5px 6px calc(6px + env(safe-area-inset-bottom, 0px));
    touch-action:pan-x;
  }
  #date-strip { flex-direction:row; width:max-content; gap:3px; }

  /* Bigger chips for touch */
  .chip { min-width:48px; width:auto; padding:6px 8px 7px; }
  .chip .d { font-size:16px; }

  /* Bigger zoom buttons */
  .leaflet-control-zoom a {
    width:40px !important; height:40px !important; line-height:38px !important;
    font-size:18px !important;
  }

  /* Marker panel: wider, readable */
  .marker-panel { max-width:calc(100vw - 24px); font-size:12px; line-height:1.6; }

}

/* ── ALARM VIDEO ─── */
#alarm {
  position: absolute;
  top: 12px; right: 12px;
  z-index: 1000;
  width: 220px;
  height: auto;
  opacity: 0.9;
  mix-blend-mode: screen;
  cursor: pointer;
  transition: opacity .2s;
}
#alarm.muted { opacity: 0.3; filter: grayscale(1); }


/* ── LEAFLET ─── */
.marker-panel {
  display:none; position:absolute; z-index:2000;
  background:rgba(10,10,26,0.92); border:1px solid #dd0000;
  color:#fff; font-family:Arial,sans-serif; font-size:11px;
  padding:6px 10px; max-width:190px;
  white-space:normal; line-height:1.5; box-shadow:2px 2px 0 #000;
  pointer-events:none; word-break:break-word;
}
.marker-panel.visible { display:block; }
.marker-panel.pinned { pointer-events:auto; padding-right:22px; }
.panel-close {
  position:absolute; top:4px; right:7px;
  cursor:pointer; color:#888; font-size:15px; line-height:1;
  user-select:none;
}
.panel-close:hover { color:#fff; }

.leaflet-control-zoom { border:none !important; box-shadow:none !important; }
.leaflet-control-zoom a {
  background:rgba(10,10,26,0.92) !important; color:#dd0000 !important;
  border:1px solid #dd0000 !important; border-radius:0 !important;
  font-family:'Arial Black',Arial,sans-serif !important; font-weight:900 !important;
  width:28px !important; height:28px !important; line-height:26px !important;
}
.leaflet-control-zoom a:hover { background:#dd0000 !important; color:#fff !important; }
.leaflet-control-attribution { background:rgba(10,10,26,0.7) !important; color:#2a1100 !important; font-size:7px !important; }
</style>

</div>

const M = ['','JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

const map = L.map('map', { center:[52.4064,16.9252], zoom:13, zoomControl:false });
L.control.zoom({ position:'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CartoDB', subdomains:'abcd', maxZoom:19,
}).addTo(map);

let activeDate = null;
let markerLayer = L.layerGroup().addTo(map);
let lineLayer   = L.layerGroup().addTo(map);
let loadedLines = new Set();

const panel = document.getElementById('marker-panel');
let panelPinned = false;
let panelLatlng = null;
let pinnedMarker = null;

function positionPanel(latlng) {
  const p = map.latLngToContainerPoint(latlng);
  const mapEl = document.getElementById('map');
  const mw = mapEl.offsetWidth, mh = mapEl.offsetHeight;
  const pw = panel.offsetWidth || 190, ph = panel.offsetHeight || 60;
  let left = p.x + 18, top = p.y - Math.round(ph / 2);
  if (left + pw > mw - 10) left = p.x - pw - 10;
  if (top < 10) top = 10;
  if (top + ph > mh - 10) top = mh - ph - 10;
  panel.style.left = left + 'px';
  panel.style.top  = top  + 'px';
}

function closePanel() {
  panelPinned = false;
  panelLatlng = null;
  pinnedMarker = null;
  panel.classList.remove('visible', 'pinned');
}

function makeMarker(count) {
  const s = count >= 6 ? 1.4 : count >= 3 ? 1.2 : 1;
  const fs = Math.round(28 * s);
  return L.divIcon({
    className: '',
    html: `<span style="font-size:${fs}px;line-height:1;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8))">🗑️</span>`,
    iconSize: [fs, fs],
    iconAnchor: [Math.round(fs/2), fs],
    popupAnchor: [0, -fs],
  });
}

function buildStrip() {
  const strip = document.getElementById('date-strip');
  const today = new Date().toISOString().slice(0,10);
  const maxCount = Math.max(...DATA.all_dates.map(d => (DATA.by_date[d]||[]).length));

  DATA.all_dates.forEach(d => {
    const [,mo,day] = d.split('-').map(Number);
    const count = (DATA.by_date[d]||[]).length;
    const rel = count / maxCount;
    const chip = document.createElement('div');
    chip.className = 'chip' + (d >= today ? ' future' : '');
    chip.dataset.date = d;
    const fill = Math.round(Math.max(8, rel * 100));
    chip.innerHTML = `<span class="d">${String(day).padStart(2,'0')}</span><span class="m">${M[mo]}</span><span class="bar" style="--fill:${fill}%"></span>`;
    if (d >= today) chip.style.opacity = String(0.3 + 0.7 * rel);
    chip.addEventListener('click', () => selectDate(d));
    strip.appendChild(chip);
  });

  const next = DATA.all_dates.find(d => d >= today);
  if (next) setTimeout(() => {
    selectDate(next);
    document.querySelector(`.chip[data-date="${next}"]`)
      ?.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  }, 300);
}

function selectDate(dateStr) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`.chip[data-date="${dateStr}"]`)?.classList.add('active');
  activeDate = dateStr;
  markerLayer.clearLayers(); lineLayer.clearLayers(); loadedLines.clear();
  closePanel();

  const entries = DATA.by_date[dateStr] || [];
  const [y,mo,day] = dateStr.split('-').map(Number);

  entries.forEach(e => {
    const bldgStr = (e.buildings||[]).join(', ');
    const html = bldgStr
      ? `<b>${e.street}</b><br/><span style="color:#ffaa00;font-size:10px">${bldgStr}</span>`
      : `<b>${e.street}</b>`;

    const m = L.marker([e.lat,e.lng], {icon:makeMarker(entries.length)}).addTo(markerLayer);

    m.on('mouseover', () => {
      if (panelPinned) return;
      panel.innerHTML = html;
      panel.classList.add('visible');
      panel.classList.remove('pinned');
      positionPanel(m.getLatLng());
    });
    m.on('mouseout', () => {
      if (!panelPinned) panel.classList.remove('visible');
    });
    m.on('click', (ev) => {
      L.DomEvent.stopPropagation(ev);
      if (panelPinned && pinnedMarker === m) { closePanel(); return; }
      panelPinned = true;
      panelLatlng = m.getLatLng();
      pinnedMarker = m;
      panel.innerHTML = html;
      panel.classList.add('visible', 'pinned');
      positionPanel(m.getLatLng());
      const btn = document.createElement('span');
      btn.className = 'panel-close';
      btn.textContent = '×';
      btn.addEventListener('click', (e) => { e.stopPropagation(); closePanel(); });
      panel.prepend(btn);
    });
    m.on('dblclick', (ev) => {
      L.DomEvent.stopPropagation(ev);
      closePanel();
    });
  });

  const byDist = {};
  entries.forEach(e => { byDist[e.district] = (byDist[e.district]||0)+1; });
  document.getElementById('info-date').textContent = `${String(day).padStart(2,'0')}.${String(mo).padStart(2,'0')}.${y}`;
  document.getElementById('info-dist').innerHTML =
    Object.entries(byDist).map(([k,v])=>`<span style="color:#ffaa00">${k.toUpperCase()}</span>: <b style="color:#ff4444">${v}</b>`).join('<br/>');
  document.getElementById('info-total').textContent = `STREETS TOTAL: ${entries.length}`;
  document.getElementById('info').classList.add('show');

  if (map.getZoom() >= 14) loadStreetLines(entries);
}

async function loadStreetLines(entries) {
  if (!entries.length) return;
  const b = map.getBounds();
  const bbox = `${b.getSouth().toFixed(4)},${b.getWest().toFixed(4)},${b.getNorth().toFixed(4)},${b.getEast().toFixed(4)}`;
  for (const e of entries) {
    if (loadedLines.has(e.street)) continue;
    loadedLines.add(e.street);
    const q = `[out:json][bbox:${bbox}];way["name"="${e.street.replace(/"/g,'\\"')}"]["highway"];out geom;`;
    try {
      const r = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
      const d = await r.json();
      d.elements.forEach(el => {
        if (el.geometry?.length > 1)
          L.polyline(el.geometry.map(p=>[p.lat,p.lon]),
            {color:'#dd0000',weight:5,opacity:0.9}).addTo(lineLayer);
      });
    } catch(_) {}
    await new Promise(r=>setTimeout(r,180));
  }
}

map.on('zoomend', () => {
  if (!activeDate) return;
  if (map.getZoom() >= 14) loadStreetLines(DATA.by_date[activeDate]||[]);
  else { lineLayer.clearLayers(); loadedLines.clear(); }
});

map.on('move zoom', () => {
  if (panelPinned && panelLatlng) positionPanel(panelLatlng);
});

buildStrip();

// Siren toggle — click alarm video
const sirenAudio = document.getElementById('siren');
const alarmVid   = document.getElementById('alarm');
let sirenOn = false;

alarmVid.addEventListener('click', () => {
  if (sirenOn) {
    sirenAudio.pause();
    sirenAudio.currentTime = 0;
    alarmVid.classList.add('muted');
    sirenOn = false;
  } else {
    sirenAudio.play().catch(()=>{});
    alarmVid.classList.remove('muted');
    sirenOn = true;
  }
});
